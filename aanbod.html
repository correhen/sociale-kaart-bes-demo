<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hulp & aanbod - Sociale Kaart Bonaire</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Sociale Kaart Bonaire</a>
    <nav>
      <a href="organisaties.html" data-i18n="navOrganizations">Organisaties</a>
      <a class="active" href="aanbod.html" data-i18n="navServices">Hulp & aanbod</a>
      <a href="activiteiten.html" data-i18n="navEvents">Activiteiten</a>
    </nav>
  </header>
  <main>
    <section class="page-intro page-intro-media">
      <div>
        <h1 data-i18n="servicesTitle">Hulp & aanbod</h1>
        <p data-i18n="servicesIntro">Zoek niet alleen op organisatie, maar op wat iemand nodig heeft. Dit wordt het hart van de sociale kaart.</p>
      </div>
      <picture class="intro-photo">
        <source srcset="assets/img/hero/guidance.webp" type="image/webp" />
        <img src="assets/img/hero/guidance.png" alt="Persoonlijke begeleiding en ondersteuning" />
      </picture>
    </section>
    <section class="filter-panel">
      <input id="q" placeholder="Waar zoek je hulp bij?" data-i18n-placeholder="searchServices" />
      <select id="island"><option value="" data-i18n="filterAllIslands">Alle eilanden</option></select>
      <select id="theme"><option value="" data-i18n="filterAllThemes">Alle thema's</option></select>
      <select id="audience"><option value="" data-i18n="filterAllAudiences">Alle doelgroepen</option></select>
      <label class="check"><input type="checkbox" id="direct" /> <span data-i18n="directHelp">Directe hulp</span></label>
      <button id="reset" data-i18n="resetButton">Reset</button>
    </section>
    <section class="cards wide" id="results"></section>
  </main>
  <footer class="site-footer">
    <p>&copy; 2026 Kadena Hubenil &middot; Nos Boneiru</p>
  </footer>
  <script src="assets/app.js"></script>
  <script>initServices();</script>
</body>
</html>
