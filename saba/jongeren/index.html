<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Youth - YouthCare Compass Saba</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="audience-youth island-context" data-page="audience-home" data-audience="youth" data-island="saba">
  <header class="site-header kh-header">
    <a class="brand island-brand" href="../"><img src="../../assets/brand/web/youthcare-compass-saba-450.webp" alt="YouthCare Compass Saba" /></a>
    <nav><a class="active" href="./" data-audience-link="youth">Youth</a><a href="../professionals/" data-audience-link="professional">Professionals</a><a href="organisaties/" data-i18n="organizationsNav">Organisations</a></nav>
    <div data-language-slot></div>
  </header>
  <main>
    <section class="youth-hero-shell island-youth-hero" aria-labelledby="youthHeroTitle">
      <img class="youth-accent youth-accent--yellow" src="../../assets/img/accents/kadena-swoosh-yellow.svg" width="360" height="108" alt="" aria-hidden="true" />
      <img class="youth-accent youth-accent--aqua" src="../../assets/img/accents/kadena-swoosh-aqua.svg" width="320" height="112" alt="" aria-hidden="true" />
      <img class="youth-accent youth-accent--burst" src="../../assets/img/accents/kadena-burst.svg" width="160" height="160" alt="" aria-hidden="true" />
      <div class="youth-hero-card">
        <div class="youth-hero-copy">
          <span class="island-hero-brand">YouthCare Compass Saba</span>
          <h1 id="youthHeroTitle">Help and information on Saba</h1>
          <p>Everything you need, in one place.</p>
          <form id="audienceSearch" class="hero-search kh-search youth-live-search" role="search">
            <label class="sr-only" for="q">Search</label>
            <input id="q" name="q" type="search" placeholder="What do you need help with?" autocomplete="off" aria-autocomplete="list" aria-expanded="false" aria-controls="audienceSearchResults" />
            <button type="submit">Search</button>
            <div id="audienceSearchResults" class="search-suggestions" role="listbox" hidden></div>
          </form>
          <div class="popular-themes" aria-label="Popular topics">
            <span>Popular:</span>
            <a href="organisaties/?theme=hulp-ondersteuning" data-theme-chip="help_support">Help and support</a>
            <a href="organisaties/?theme=familie-omgang" data-theme-chip="family_system">Family and relationships</a>
            <a href="organisaties/?theme=gezondheid-welzijn" data-theme-chip="health_wellbeing">Health and wellbeing</a>
            <a href="organisaties/?theme=directe-hulp" data-theme-chip="direct_help">Direct help</a>
          </div>
          <div class="hero-actions"><a class="button primary" href="organisaties/">All organisations</a></div>
        </div>
        <div class="youth-hero-media" aria-hidden="true">
          <picture>
            <source media="(max-width: 680px)" srcset="../../assets/img/web/jongeren-hero-600.webp" />
            <source media="(max-width: 980px)" srcset="../../assets/img/web/jongeren-hero-900.webp" />
            <img src="../../assets/img/web/jongeren-hero-1400.webp" width="1400" height="1400" loading="eager" fetchpriority="high" alt="" />
          </picture>
        </div>
      </div>
    </section>
    <section class="section"><div class="section-head"><h2 data-i18n="themesTitle">Topics</h2></div><div class="kh-theme-grid" id="themeTiles"></div></section>
    <section class="section"><div class="section-head"><h2 id="featuredOrganizationsTitle" data-i18n="popularOrganizations">Organisations</h2></div><div class="cards wide" id="featuredOrganizations"></div></section>
  </main>
  <footer class="site-footer"><p>&copy; 2026 YouthCare Compass Saba</p></footer>
  <script>window.SEED_BASE='../../';window.ISLAND_CONTEXT='saba';</script><script src="../../assets/app.js"></script><script>initAudienceHome('youth');</script>
</body>
</html>
