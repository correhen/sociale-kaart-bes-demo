<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activiteiten - Sociale Kaart Bonaire</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Sociale Kaart Bonaire</a>
    <nav>
      <a href="organisaties.html" data-i18n="navOrganizations">Organisaties</a>
      <a href="aanbod.html" data-i18n="navServices">Hulp & aanbod</a>
      <a class="active" href="activiteiten.html" data-i18n="navEvents">Activiteiten</a>
    </nav>
  </header>
  <main>
    <section class="page-intro">
      <h1 data-i18n="eventsTitle">Activiteiten</h1>
      <p data-i18n="eventsIntro">Een agenda maakt de sociale kaart concreet en aantrekkelijker voor jongeren en ouders.</p>
    </section>
    <section class="filter-panel">
      <input id="q" placeholder="Zoek activiteit" data-i18n-placeholder="searchEvents" />
      <select id="island"><option value="" data-i18n="filterAllIslands">Alle eilanden</option></select>
      <select id="theme"><option value="" data-i18n="filterAllThemes">Alle thema's</option></select>
      <select id="audience"><option value="" data-i18n="filterAllAudiences">Alle doelgroepen</option></select>
      <button id="reset" data-i18n="resetButton">Reset</button>
    </section>
    <section class="cards wide" id="results"></section>
  </main>
  <footer class="site-footer">
    <p>&copy; 2026 Kadena Hubenil &middot; Nos Boneiru</p>
  </footer>
  <script src="assets/app.js"></script>
